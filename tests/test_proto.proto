syntax = "proto3";

package test_proto;

enum Status {
    UNKNOWN = 0;
    ACTIVE = 1;
    INACTIVE = 2;
}

message User {
    string id = 1;
    string name = 2;
    string email = 3;
    int32 age = 4;
    Status status = 5;
    
    repeated string roles = 6;
    map<string, int32> scores = 7;
    
    Address address = 8;
    
    oneof avatar {
        string avatar_url = 9;
        bytes avatar_bytes = 10;
    }
}

message Address {
    string street = 1;
    string city = 2;
    string country = 3;
    float lat = 4;
    float lng = 5;
}

message RecursiveNode {
    int32 value = 1;
    RecursiveNode left = 2;
    RecursiveNode right = 3;
}
